<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #fafafa;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .login-box {
      background: #fff;
      width: 350px;
      padding: 40px;
      border: 1px solid #dbdbdb;
      text-align: center;
    }

    .login-box img {
      width: 180px;
      margin-bottom: 20px;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      background: #fafafa;
    }

    .login-box button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      background: #3897f0;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .login-box button:hover {
      background: #3183d6;
    }

    .or::before,
    .or::after {
      content: "";
      flex: 1;
      border-bottom: 1px solid #dbdbdb;
    }

    .or:not(:empty)::before {
      margin-right: .75em;
    }

    .or:not(:empty)::after {
      margin-left: .75em;
    }

    .signup a {
      text-decoration: none;
      font-weight: bold;
      color: #3897f0;
    }

    .message {
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="login-box">
      <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" alt="Instagram">
      <input type="text" id="username" placeholder="Phone number, username, or email">
      <input type="password" id="password" placeholder="Password">
      <button onclick="login()">Log In</button>
    
      <button style="background:#385185;">Log in with Facebook</button>
      <p class="message" id="message"></p>
    </div>
    <div class="login-box" style="margin-top:10px; padding:20px;">
      <p class="signup">Don't have an account? <a href="#">Sign up</a></p>
    </div>
  </div>

  <script>
    function login() {
      let user = document.getElementById("username").value;
      let pass = document.getElementById("password").value;
      let msg = document.getElementById("message");


      if (user === "admin " && pass === "12345") {
        msg.style.color = "green";
        msg.innerText = "Login Successful ";
      } else {
        msg.style.color = "red";
        msg.innerText = "Invalid Username or Password ";
      }
    }
  </script>
</body>

</html>
